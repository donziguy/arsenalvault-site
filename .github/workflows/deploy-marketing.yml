name: Deploy Marketing Site

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Hostinger
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 46.202.198.30
          port: 65002
          username: u421117894
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          timeout: 120s
          script: bash ~/deploy.sh

      - name: Remove obsolete review draft
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 46.202.198.30
          port: 65002
          username: u421117894
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          timeout: 120s
          script: rm -f ~/domains/arsenalvault.com/public_html/legal-new.html

      - name: Upload marketing files directly
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 46.202.198.30
          port: 65002
          username: u421117894
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          timeout: 120s
          source: "index.html,about.html,features.html,pricing.html,download.html,support.html,upgrade.html,security.html,legal.html,sitemap.xml,robots.txt,.htaccess,img/*,img/screenshots/*,static/*,static/img/*,blog/*,support/*,checklist/*"
          target: "~/domains/arsenalvault.com/public_html/"
          overwrite: true
