name: Deploy Marketing Site

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy marketing site to Hostinger
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 46.202.198.30
          port: 65002
          username: u421117894
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          timeout: 120s
          command_timeout: 8m
          script: |
            set -e
            WEBROOT="$HOME/domains/arsenalvault.com/public_html"
            TMPDIR=$(mktemp -d)
            trap 'rm -rf "$TMPDIR"' EXIT
            curl -fsSL "https://github.com/donziguy/arsenalvault-site/archive/refs/heads/main.tar.gz?deploy=$(date +%s)" -o "$TMPDIR/site.tgz"
            tar -xzf "$TMPDIR/site.tgz" -C "$TMPDIR"
            cd "$WEBROOT"
            cp index.html "index.html.bak.$(date +%Y%m%d%H%M%S)"
            cp -a "$TMPDIR/arsenalvault-site-main/." "$WEBROOT/"
            rm -rf "$WEBROOT/.github" "$WEBROOT/legal-new.html"
            grep -n "All plans include a 15-day free trial" "$WEBROOT/index.html"
